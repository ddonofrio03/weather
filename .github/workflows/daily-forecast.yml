name: Daily Weather Email

on:
  schedule:
    # Runs once daily at 10:15 UTC = 6:15am ET during EDT (mid-Mar to early Nov).
    # GitHub cron is UTC and does not shift for daylight saving. When EST begins
    # in November, change this to '15 11 * * *' to keep it near 6am ET.
    # A few minutes past the hour on purpose: top-of-hour runs are the most
    # likely to be delayed or dropped by GitHub.
    - cron: '15 10 * * *'
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send forecast email
        env:
          WB_API_KEY:         ${{ secrets.WB_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER:         lbidonofrio@gmail.com
          MAIL_TO:            "ddonofrio@thecaseygroup.us,stephdonofrio@gmail.com"
          PLACE:              "Murrells Inlet, SC"
          LAT:                "33.55"
          LON:                "-79.04"
          MODEL:              "wm-5c"
          FORCE_SEND:         "1"
        run: python forecast_email.py
