name: Daily Weather Email

# Triggered every morning at 6:15 AM Eastern by cron-job.org calling the
# GitHub API (workflow_dispatch). GitHub's own cron scheduler is NOT used:
# it proved unreliable (runs delayed hours or dropped entirely).
# The manual "Run workflow" button in the Actions tab also works any time.

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send forecast email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER:         lbidonofrio@gmail.com
          MAIL_TO:            "ddonofrio@thecaseygroup.us,stephdonofrio@gmail.com"
          PLACE:              "Murrells Inlet, SC"
          LAT:                "33.55"
          LON:                "-79.04"
          FORCE_SEND:         "1"
        run: python forecast_email.py
